<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Worker to Worker Investor identity transition</title>
  <desc id="desc">A left-to-right path from worker through allocation to Worker Investor, ownership, and possible future options.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#101114" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#343842"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#4B3FB4"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#F6F4ED"/>
  <rect width="1200" height="620" fill="url(#grid)"/>
  <g font-family="Inter, Arial, sans-serif" letter-spacing="0">
    <g fill="#343842" font-size="18" font-weight="700">
      <text x="74" y="92">PRESENT CONDITION</text>
      <text x="438" y="92">THE SHIFT</text>
      <text x="870" y="92">FUTURE RELATIONSHIP</text>
    </g>
    <path d="M256 296H382" fill="none" stroke="#343842" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M522 296H646" fill="none" stroke="#343842" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M852 296H946" fill="none" stroke="#343842" stroke-width="4" marker-end="url(#arrow)"/>

    <g>
      <rect x="74" y="208" width="182" height="176" rx="4" fill="#FFFFFB" stroke="#101114" stroke-width="3"/>
      <rect x="74" y="208" width="10" height="176" fill="#B85F3B"/>
      <text x="104" y="268" fill="#101114" font-size="27" font-weight="800">WORKER</text>
      <text x="104" y="314" fill="#343842" font-size="18">Time + skill</text>
      <text x="104" y="342" fill="#343842" font-size="18">for wage</text>
    </g>

    <g>
      <circle cx="452" cy="296" r="70" fill="#FFFFFB" stroke="#C6A64F" stroke-width="7"/>
      <text x="452" y="290" text-anchor="middle" fill="#101114" font-size="20" font-weight="800">ALLOCATE</text>
      <text x="452" y="320" text-anchor="middle" fill="#343842" font-size="16">money + self</text>
    </g>

    <g>
      <rect x="646" y="188" width="206" height="216" rx="4" fill="#FFFFFB" stroke="#101114" stroke-width="5"/>
      <rect x="646" y="188" width="206" height="10" fill="#0D6B57"/>
      <text x="674" y="254" fill="#101114" font-size="23" font-weight="800">WORKER</text>
      <text x="674" y="286" fill="#101114" font-size="23" font-weight="800">INVESTOR</text>
      <text x="674" y="338" fill="#343842" font-size="17">Work still matters.</text>
      <text x="674" y="366" fill="#343842" font-size="17">More of it remains.</text>
    </g>

    <g>
      <rect x="946" y="234" width="108" height="124" rx="4" fill="#0D6B57" fill-opacity=".14" stroke="#0D6B57" stroke-width="4"/>
      <text x="1000" y="290" text-anchor="middle" fill="#101114" font-size="17" font-weight="800">OWN</text>
      <text x="1000" y="318" text-anchor="middle" fill="#343842" font-size="15">assets</text>
    </g>

    <path d="M1054 296H1100" fill="none" stroke="#4B3FB4" stroke-width="4" stroke-dasharray="10 9" marker-end="url(#arrowPurple)"/>
    <path d="M1102 296c30 0 26-58 54-58M1102 296c30 0 26 58 54 58" fill="none" stroke="#4B3FB4" stroke-width="4"/>
    <circle cx="1160" cy="238" r="11" fill="#4B3FB4"/>
    <circle cx="1160" cy="354" r="11" fill="#4B3FB4"/>
    <text x="1096" y="414" fill="#4B3FB4" font-size="17" font-weight="800">OPTIONS</text>

    <line x1="74" y1="486" x2="1126" y2="486" stroke="#101114" stroke-opacity=".16" stroke-width="2"/>
    <text x="74" y="530" fill="#343842" font-size="21">The job may remain the same. What the work is allowed to produce begins to change.</text>
  </g>
</svg>

