<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 940" role="img" aria-labelledby="title desc">
  <title id="title">Human Capital ETF portfolio stack</title>
  <desc id="desc">Core forms the base, Growth expands it, Distribution travels outward, and Meta rebalances the whole portfolio.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#2F6597"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#4B3FB4"/>
    </marker>
  </defs>
  <rect width="600" height="940" fill="#F6F4ED"/>
  <g font-family="Inter, Arial, sans-serif" letter-spacing="0">
    <text x="42" y="56" fill="#343842" font-size="22" font-weight="800">LIMITED INPUT</text>
    <text x="42" y="92" fill="#101114" font-size="28" font-weight="800">Time + energy + attention</text>
    <path d="M300 116V166" fill="none" stroke="#343842" stroke-width="5"/>
    <path d="M286 152l14 18 14-18" fill="none" stroke="#343842" stroke-width="5"/>

    <rect x="74" y="190" width="452" height="116" rx="4" fill="#2F6597" fill-opacity=".12" stroke="#2F6597" stroke-width="4"/>
    <rect x="74" y="190" width="12" height="116" fill="#2F6597"/>
    <text x="112" y="242" fill="#101114" font-size="28" font-weight="800">DISTRIBUTION</text>
    <text x="112" y="278" fill="#343842" font-size="20">writing · public work · channels</text>
    <path d="M526 248H570" fill="none" stroke="#2F6597" stroke-width="5" marker-end="url(#arrowBlue)"/>

    <rect x="74" y="328" width="452" height="132" rx="4" fill="#0D6B57" fill-opacity=".12" stroke="#0D6B57" stroke-width="4"/>
    <rect x="74" y="328" width="12" height="132" fill="#0D6B57"/>
    <text x="112" y="386" fill="#101114" font-size="29" font-weight="800">GROWTH</text>
    <text x="112" y="424" fill="#343842" font-size="20">AI · coding · new skills · experiments</text>

    <rect x="74" y="482" width="452" height="152" rx="4" fill="#343842" fill-opacity=".11" stroke="#343842" stroke-width="4"/>
    <rect x="74" y="482" width="12" height="152" fill="#343842"/>
    <text x="112" y="542" fill="#101114" font-size="30" font-weight="800">CORE</text>
    <text x="112" y="580" fill="#343842" font-size="20">health · employability · domain skill</text>
    <text x="112" y="610" fill="#737984" font-size="19">the base that keeps the portfolio alive</text>

    <path d="M542 170C594 280 588 584 518 690" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrowPurple)"/>
    <path d="M518 690C392 760 186 748 64 652" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="12 10"/>
    <path d="M64 652C18 528 18 276 58 174" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrowPurple)"/>

    <text x="42" y="782" fill="#4B3FB4" font-size="25" font-weight="800">META</text>
    <text x="42" y="816" fill="#343842" font-size="20">review · select · rebalance</text>
    <rect x="292" y="754" width="266" height="98" rx="4" fill="#FFFFFB" stroke="#4B3FB4" stroke-width="4"/>
    <text x="425" y="794" text-anchor="middle" fill="#4B3FB4" font-size="22" font-weight="800">PORTFOLIO TEST</text>
    <text x="425" y="826" text-anchor="middle" fill="#343842" font-size="19">Do the positions reinforce?</text>
    <text x="42" y="900" fill="#737984" font-size="19">Conceptual allocation · not financial advice</text>
  </g>
</svg>

