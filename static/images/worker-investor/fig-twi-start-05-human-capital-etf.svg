<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Human Capital ETF portfolio stack</title>
  <desc id="desc">A portfolio stack shows Core as the foundation, Growth above it, Distribution moving outward, and Meta rebalancing the entire system.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#2F6597"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#4B3FB4"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#F6F4ED"/>
  <g font-family="Inter, Arial, sans-serif" letter-spacing="0">
    <text x="78" y="74" fill="#343842" font-size="18" font-weight="800">LIMITED INPUT</text>
    <text x="78" y="110" fill="#101114" font-size="29" font-weight="800">Time + energy + attention</text>

    <path d="M246 158V206" fill="none" stroke="#343842" stroke-width="4"/>
    <path d="M232 196l14 18 14-18" fill="none" stroke="#343842" stroke-width="4"/>

    <rect x="184" y="488" width="692" height="152" rx="4" fill="#343842" fill-opacity=".11" stroke="#343842" stroke-width="3"/>
    <rect x="184" y="488" width="12" height="152" fill="#343842"/>
    <text x="224" y="542" fill="#101114" font-size="29" font-weight="800">CORE</text>
    <text x="224" y="580" fill="#343842" font-size="18">health · employability · domain skill · reliable cash flow</text>
    <text x="224" y="612" fill="#737984" font-size="16">the base that keeps the portfolio alive</text>

    <rect x="250" y="342" width="626" height="126" rx="4" fill="#0D6B57" fill-opacity=".12" stroke="#0D6B57" stroke-width="3"/>
    <rect x="250" y="342" width="12" height="126" fill="#0D6B57"/>
    <text x="292" y="394" fill="#101114" font-size="27" font-weight="800">GROWTH</text>
    <text x="292" y="430" fill="#343842" font-size="18">AI · coding · new skills · experiments · languages</text>

    <rect x="318" y="216" width="558" height="106" rx="4" fill="#2F6597" fill-opacity=".12" stroke="#2F6597" stroke-width="3"/>
    <rect x="318" y="216" width="12" height="106" fill="#2F6597"/>
    <text x="360" y="260" fill="#101114" font-size="25" font-weight="800">DISTRIBUTION</text>
    <text x="360" y="294" fill="#343842" font-size="17">writing · public work · reputation · channels</text>

    <path d="M876 269H1036" fill="none" stroke="#2F6597" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <path d="M876 288H980" fill="none" stroke="#2F6597" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <text x="930" y="238" fill="#2F6597" font-size="16" font-weight="800">CAPABILITY TRAVELS</text>

    <path d="M936 154C1088 230 1096 532 916 654" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="13 10" marker-end="url(#arrowPurple)"/>
    <path d="M916 654C714 732 254 716 128 554" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="13 10"/>
    <path d="M128 554C24 420 48 232 182 160" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="13 10" marker-end="url(#arrowPurple)"/>
    <text x="888" y="122" fill="#4B3FB4" font-size="21" font-weight="800">META</text>
    <text x="888" y="150" fill="#343842" font-size="16">review · select · rebalance</text>

    <rect x="914" y="478" width="208" height="116" rx="4" fill="#FFFFFB" stroke="#4B3FB4" stroke-width="3"/>
    <text x="1018" y="522" text-anchor="middle" fill="#4B3FB4" font-size="18" font-weight="800">PORTFOLIO TEST</text>
    <text x="1018" y="552" text-anchor="middle" fill="#343842" font-size="15">Do these positions</text>
    <text x="1018" y="575" text-anchor="middle" fill="#343842" font-size="15">reinforce one another?</text>

    <text x="78" y="714" fill="#737984" font-size="16">Conceptual allocation · not measured proportions · not financial advice</text>
  </g>
</svg>

