<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" role="img" aria-labelledby="title desc">
  <title id="title">Payday and between-payday allocation cycles</title>
  <desc id="desc">A financial allocation cycle sits above a human-capital allocation cycle, with better choices connecting them.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#343842"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l9 5-9 5z" fill="#4B3FB4"/>
    </marker>
  </defs>
  <rect width="600" height="1020" fill="#F6F4ED"/>
  <g font-family="Inter, Arial, sans-serif" letter-spacing="0">
    <text x="42" y="58" fill="#B85F3B" font-size="22" font-weight="800">ON PAYDAY</text>
    <text x="42" y="94" fill="#101114" font-size="27" font-weight="800">Allocate the result of past labor.</text>

    <circle cx="112" cy="206" r="58" fill="#B85F3B" fill-opacity=".14" stroke="#B85F3B" stroke-width="4"/>
    <text x="112" y="200" text-anchor="middle" fill="#101114" font-size="25" font-weight="800">WAGE</text>
    <text x="112" y="230" text-anchor="middle" fill="#343842" font-size="19">cash flow</text>
    <path d="M170 206H238" fill="none" stroke="#343842" stroke-width="5" marker-end="url(#arrow)"/>
    <circle cx="300" cy="206" r="58" fill="#C6A64F" fill-opacity=".16" stroke="#C6A64F" stroke-width="4"/>
    <text x="300" y="200" text-anchor="middle" fill="#101114" font-size="25" font-weight="800">SAVE</text>
    <text x="300" y="230" text-anchor="middle" fill="#343842" font-size="19">preserve</text>
    <path d="M358 206H426" fill="none" stroke="#343842" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="438" y="148" width="112" height="116" rx="4" fill="#0D6B57" fill-opacity=".14" stroke="#0D6B57" stroke-width="4"/>
    <text x="494" y="198" text-anchor="middle" fill="#101114" font-size="24" font-weight="800">OWN</text>
    <text x="494" y="228" text-anchor="middle" fill="#343842" font-size="19">assets</text>
    <path d="M494 264C494 344 112 344 112 264" fill="none" stroke="#343842" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
    <text x="300" y="330" text-anchor="middle" fill="#737984" font-size="20">financial resilience</text>

    <line x1="42" y1="382" x2="558" y2="382" stroke="#101114" stroke-opacity=".16" stroke-width="2"/>
    <text x="42" y="438" fill="#0D6B57" font-size="22" font-weight="800">BETWEEN PAYDAYS</text>
    <text x="42" y="474" fill="#101114" font-size="27" font-weight="800">Allocate the capacity for future labor.</text>

    <circle cx="112" cy="590" r="58" fill="#C6A64F" fill-opacity=".16" stroke="#C6A64F" stroke-width="4"/>
    <text x="112" y="584" text-anchor="middle" fill="#101114" font-size="21" font-weight="800">EXPERIENCE</text>
    <text x="112" y="614" text-anchor="middle" fill="#343842" font-size="19">real work</text>
    <path d="M170 590H238" fill="none" stroke="#343842" stroke-width="5" marker-end="url(#arrow)"/>
    <circle cx="300" cy="590" r="58" fill="#0D6B57" fill-opacity=".14" stroke="#0D6B57" stroke-width="4"/>
    <text x="300" y="584" text-anchor="middle" fill="#101114" font-size="21" font-weight="800">CAPABILITY</text>
    <text x="300" y="614" text-anchor="middle" fill="#343842" font-size="19">judgment</text>
    <path d="M358 590H426" fill="none" stroke="#343842" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="438" y="532" width="112" height="116" rx="4" fill="#2F6597" fill-opacity=".14" stroke="#2F6597" stroke-width="4"/>
    <text x="494" y="580" text-anchor="middle" fill="#101114" font-size="21" font-weight="800">PUBLIC</text>
    <text x="494" y="610" text-anchor="middle" fill="#101114" font-size="21" font-weight="800">WORK</text>
    <path d="M494 648C494 728 112 728 112 648" fill="none" stroke="#343842" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
    <text x="300" y="714" text-anchor="middle" fill="#737984" font-size="20">reputation + learning</text>

    <path d="M300 756V804" fill="none" stroke="#4B3FB4" stroke-width="5" stroke-dasharray="11 9" marker-end="url(#arrowPurple)"/>
    <rect x="92" y="816" width="416" height="94" rx="4" fill="#FFFFFB" stroke="#4B3FB4" stroke-width="4"/>
    <text x="300" y="854" text-anchor="middle" fill="#4B3FB4" font-size="24" font-weight="800">BETTER CHOICES</text>
    <text x="300" y="884" text-anchor="middle" fill="#343842" font-size="20">the two portfolios reinforce each other</text>
    <text x="42" y="970" fill="#343842" font-size="21">Two clocks, one practice.</text>
  </g>
</svg>

