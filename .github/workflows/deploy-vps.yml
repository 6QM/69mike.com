name: Deploy Hugo site to production VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-vps
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://69mike.com/
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Check repository diff
        run: git diff --check

      - name: Configure production SSH access
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/69mike_vps_deploy_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/69mike_vps_deploy_ed25519" "$HOME/.ssh/known_hosts"

      - name: Build, back up, deploy, and verify production
        run: |
          SSH_KEY="$HOME/.ssh/69mike_vps_deploy_ed25519" \
            ./scripts/deploy-vps.sh
