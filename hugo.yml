baseURL: "https://69mike.com/"
title: Qiaomai Liu
# paginate: 5
pagination:
  pagerSize: 5     # 原来 paginate 的值
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Qiaomai Liu
  description: "Personal homepage, long-form writing center, and project hub for The Worker Investor and Human Capital ETF."
  keywords: [Blog, Essays, Projects, Human Capital ETF, The Worker Investor, Qiaomai Liu]
  author: Qiaomai Liu
  # author: ["Me", "You"] # multiple authors
  images: ["/images/default-cover.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: light # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  utterances:
    repo: "6QM/blog-comments"
    issueTerm: "pathname"
    label: "💬 Comments"
    theme: "github-light"
    crossorigin: "anonymous"

  # Show posts from the primary writing section on the home page.
  mainSections:
    - posts
# folder's name for visible purpose at homepage

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/apple-touch-icon.png"

  label:
    text: "Qiaomai Liu"
    icon: /images/qiaomai-avatar.jpg
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set

  # home-info mode
  homeInfoParams:
    Title: "Qiaomai 👋"
    Content: |
      **Engineer, writer, and lifelong learner exploring how growth compounds through AI, reading, reflection, and real-world practice.**

      **Building Human Capital ETF and writing The Worker Investor.**
  socialIcons:
    - name: twitter
      url: "https://x.com/humancapitaletf"
    - name: tiktok
      title: Douyin
      url: "https://www.douyin.com/search/humancapitaletf?type=user"
    - name: youtube
      title: YouTube
      url: "https://www.youtube.com/@humancapitaletf"
    - name: github
      url: "https://github.com/6QM"

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: false # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
taxonomies:
  category: categories
  tag: tags
  series: series

menu:
  main:
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 10
    - identifier: bookshelf
      name: Bookshelf
      url: /bookshelf/
      weight: 20
    - identifier: diary
      name: Diary
      url: /diary/
      weight: 30
    - identifier: nav
      name: Navi
      url: https://tosear.ch
      weight: 40
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 50
    - identifier: about_me
      name: About
      url: /about_me/
      weight: 60
    - identifier: search
      name: Search
      url: /search/
      weight: 70
      pre: '<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>'

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  goldmark:   # 这个设置会允许 Markdown 解析器渲染原始 HTML 标签。
    renderer:
      unsafe: true # allow HTML in md files, only for bookshelf
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
# 忽略 goldmark 原生 HTML 警告
ignoreLogs:
  - "warning-goldmark-raw-html"

outputs:
    home:
        - HTML
        - RSS
        - JSON # is necessary
