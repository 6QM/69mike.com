<section class="personal-profile">
  <div class="personal-profile-photo">
    <img src="{{ .Get "photo" }}" alt="Profile photo of {{ .Get "name" }}" width="229" height="270" loading="lazy">
  </div>
  <div class="personal-profile-details">
    <p class="personal-profile-name">{{ .Get "name" }}</p>
    <ul>
      <li><a href="{{ .Get "CV" }}" target="_blank" rel="noopener noreferrer">Curriculum vitae</a></li>
      <li><a href="{{ .Get "googleScholar" }}" target="_blank" rel="noopener noreferrer">Google Scholar</a></li>
    </ul>
  </div>
  <div class="personal-profile-city">
    <img src="{{ .Get "cityPhoto" }}" alt="Chongqing city view" width="488" height="342" loading="lazy">
  </div>
</section>
