<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 1rem;">
  
    <!-- 第一列：个人照片 -->
    <div style="width: 25%; text-align: center; display: flex; align-items: center; justify-content: center;">
        <img src="{{ .Get "photo" }}" alt="Profile Photo" style="width: 120px; height: auto; border-radius: 10px;">
    </div>
    
    <!-- 第二列：个人信息 -->
    <div style="width: 40%; font-size: 1.2rem; line-height: 1.8; margin-left: 2rem;">
        <p style="font-weight: bold; font-size: 1.5rem;">{{ .Get "name" }}</p>
        <ul style="list-style-type: none; padding: 0; margin: 0;">
            <!-- <li>📞 Tel: {{ .Get "tel" }}</li> -->
            <!-- <li>E-mail: {{ .Get "email" }}</li> -->
            <!-- <li>Website: <a href="{{ .Get "website" }}" target="_blank">{{ .Get "website" }}</a></li> -->
            <li><a href="{{ .Get "CV" }}" target="_blank">Curriculum vitae</a></li>
            <li><a href="{{ .Get "googleScholar" }}" target="_blank">Google Scholar</a></li>
        </ul>
    </div>

    <!-- 第三列：城市图片 -->
    <div style="width: 35%; text-align: center; display: flex; align-items: center; justify-content: center;">
        <img src="{{ .Get "cityPhoto" }}" alt="City View" style="width: 100%; height: auto; border-radius: 5px;">
    </div>
  
</div>

<style>
  /* 间距和对齐的全局设置 */
  div[style] {
      gap: 2rem; /* 第一列与第二列之间的间距 */
  }
  ul {
      padding: 0;
      margin: 0;
  }
  ul li {
      font-size: 1rem;
      line-height: 1.5;
  }
</style>
