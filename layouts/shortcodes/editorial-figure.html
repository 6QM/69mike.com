{{- $id := .Get "id" -}}
{{- $captionID := printf "%s-caption" $id -}}
{{- $loading := .Get "loading" | default "lazy" -}}
<figure class="wi-figure{{ with .Get "class" }} {{ . }}{{ end }}" id="{{ $id }}" aria-labelledby="{{ $captionID }}">
  <picture>
    {{- with .Get "srcMobile" }}
    <source media="(max-width: 640px)" srcset="{{ . | relURL }}">
    {{- end }}
    <img
      src="{{ .Get "src" | relURL }}"
      alt="{{ .Get "alt" }}"
      width="{{ .Get "width" }}"
      height="{{ .Get "height" }}"
      loading="{{ $loading }}"
      decoding="async">
  </picture>
  <figcaption id="{{ $captionID }}">
    <span class="wi-figure-label">{{ .Get "label" }}</span>
    <strong>{{ .Get "title" }}</strong>
    {{- with .Get "caption" }}
    <span class="wi-figure-copy">{{ . }}</span>
    {{- end }}
    {{- with .Get "source" }}
    <span class="wi-figure-source">{{ . }}</span>
    {{- end }}
  </figcaption>
</figure>
